<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Register - Exam System</title>
    <link rel="stylesheet" href="/public/login.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon admin-icon">👑</div>
            <h1>Admin Register</h1>
            <p>Create your admin account</p>
        </div>
        
        <div id="register-form">
            <div class="error hidden" id="register-error"></div>
            <div class="form-group">
                <label>Admin Name</label>
                <input type="text" id="register-name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" id="register-email" placeholder="Enter admin email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="register-password" placeholder="Create admin password" required>
            </div>
            <button class="btn" onclick="registerAdmin()">Register as Admin</button>
            <p class="switch-link">Not an admin? <a href="/register.html">Register as Student</a></p>
            <p class="switch-link">Already have an account? <a href="/admin-login.html">Login as Admin</a></p>
        </div>
    </div>

    <script>
        async function checkUser() {
            const response = await fetch('/api/user', { credentials: 'include' });
            const user = await response.json();
            if (user && user.role === 'admin') {
                window.location.href = '/admin.html';
            } else if (user) {
                window.location.href = '/student-panel.html';
            }
        }
        
        checkUser();
        
        async function registerAdmin() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const errorDiv = document.getElementById('register-error');
            
            if (!name || !email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            const response = await fetch('/api/register', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, admin: true })
            });
            
            const data = await response.json();
            if (data.success && data.role === 'admin') {
                window.location.href = '/admin.html';
            } else {
                errorDiv.textContent = data.error || 'Could not register as admin';
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
