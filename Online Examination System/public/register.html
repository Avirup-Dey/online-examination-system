<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Register - Exam System</title>
    <link rel="stylesheet" href="/public/login.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon student-icon">🎓</div>
            <h1>Student Register</h1>
            <p>Create your account</p>
        </div>
        
        <div id="register-form">
            <div class="error hidden" id="register-error"></div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="register-name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="register-email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="register-password" placeholder="Create a password" required>
            </div>
            <button class="btn" onclick="register()">Register as Student</button>
            <p class="switch-link">Are you an admin? <a href="/admin-register.html">Register as Admin</a></p>
            <p class="switch-link">Already have an account? <a href="/login.html">Login as Student</a></p>
        </div>
    </div>

    <script>
        async function checkUser() {
            const response = await fetch('/api/user');
            const user = await response.json();
            if (user) {
                if (user.role === 'admin') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/student-panel.html';
                }
            }
        }
        
        checkUser();
        
        async function register() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const errorDiv = document.getElementById('register-error');
            
            if (!name || !email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, admin: false })
            });
            
            const data = await response.json();
            if (data.success) {
                if (data.role === 'admin') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/student-panel.html';
                }
            } else {
                errorDiv.textContent = data.error;
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
