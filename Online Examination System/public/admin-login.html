<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Exam System</title>
    <link rel="stylesheet" href="/login.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon admin-icon">👑</div>
            <h1>Admin Login</h1>
            <p>Access your admin panel</p>
        </div>
        
        <div id="login-form">
            <div class="error hidden" id="login-error"></div>
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" id="login-email" placeholder="Enter admin email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter password" required>
            </div>
            <button class="btn" onclick="loginAdmin()">Login as Admin</button>
            <p class="switch-link">Not an admin? <a href="/login.html">Login as Student</a></p>
            <p class="switch-link">Don't have an account? <a href="/admin-register.html">Register as Admin</a></p>
        </div>
    </div>

    <script>
        async function checkUser() {
            const response = await fetch('/api/user', { credentials: 'include' });
            const user = await response.json();
            if (user && user.role === 'admin') {
                window.location.href = '/admin.html';
            } else if (user) {
                window.location.href = '/student-panel.html';
            }
        }
        
        checkUser();
        
        async function loginAdmin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            
            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            const response = await fetch('/api/login', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, admin: true })
            });
            
            const data = await response.json();
            if (data.success && data.role === 'admin') {
                window.location.href = '/admin.html';
            } else {
                errorDiv.textContent = data.error || 'Invalid admin credentials';
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
