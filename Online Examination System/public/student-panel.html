<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Home - Exam System</title>

    <link rel="stylesheet" href="/student-panel.css">

</head>
<body>

    <nav class="navbar">

        <div class="nav-brand">

            <div class="brand-icon">
                📝
            </div>

            <span>
                Exam System
            </span>

        </div>

        <div class="nav-links">

            <div class="student-profile">Welcome

                <span id="student-name" class="student-name"></span>

            </div>

            <a
                href="/student-panel.html"
                class="nav-link"
            >
                Home
            </a>

            <a
                href="/history.html"
                class="nav-link"
            >
                History
            </a>

            <button
                class="btn-logout"
                onclick="logout()"
            >
                Logout
            </button>

        </div>

    </nav>

    <div class="hero-section">

        <h1 class="hero-title">

            Welcome to

            <span class="highlight">
                Exam System
            </span>

        </h1>

        <p class="hero-subtitle">

            Test your knowledge across various subjects

        </p>

    </div>

    <section class="section-box">

        <div class="section-header">

            <h2>
                Available Quizzes
            </h2>

        </div>

        <div
            class="quizzes-container"
            id="quizzes-container"
        ></div>

    </section>

    <script>

        let currentUser = null;

        async function loadUser() {

            try {

                const response = await fetch(
                    '/api/user',
                    {
                        credentials: 'include'
                    }
                );

                currentUser =
                    await response.json();

                if (!currentUser) {

                    window.location.href =
                        '/login.html';

                    return;

                }

                if (
                    currentUser.role === 'admin'
                ) {

                    window.location.href =
                        '/admin.html';

                    return;

                }

                document.getElementById(
                    'student-name'
                ).textContent =`
                    👨‍🎓 ${currentUser.name}`

                loadQuizzes();

            } catch (error) {

                console.log(error);

            }

        }

        async function loadQuizzes() {

            try {

                const response = await fetch(

                    '/api/student/subjects',

                    {
                        credentials: 'include'
                    }

                );

                const quizzes =
                    await response.json();

                const container =
                    document.getElementById(
                        'quizzes-container'
                    );

                container.innerHTML = '';

                if (quizzes.length === 0) {

                    container.innerHTML = `

                        <div class="empty-state">

                            <div class="empty-state-icon">
                                📚
                            </div>

                            <h3>
                                No Quizzes Available
                            </h3>

                            <p>
                                Check back later for new tests.
                            </p>

                        </div>

                    `;

                    return;

                }

                quizzes.forEach(quiz => {

                    const card =
                        document.createElement('div');

                    card.className =
                        'quiz-card';

                    card.onclick = () =>
                        startQuiz(
                            quiz.id,
                            quiz.name
                        );

                    card.innerHTML = `

                        <div class="quiz-icon">
                            📝
                        </div>

                        <h2>
                            ${quiz.name}
                        </h2>

                        <p>

                            ${
                                quiz.description ||
                                'Test your knowledge with this quiz.'
                            }

                        </p>

                        <button class="start-btn">

                            Start Quiz

                        </button>

                    `;

                    container.appendChild(card);

                });

            } catch (error) {

                console.log(error);

                alert(
                    'Failed to load quizzes'
                );

            }

        }

        function startQuiz(
            quizId,
            quizName
        ) {

            window.location.href =

                `/quiz.html?id=${quizId}&name=${encodeURIComponent(quizName)}`;

        }

        async function logout() {

            await fetch(
                '/api/logout',
                {
                    credentials: 'include'
                }
            );

            window.location.href = '/';

        }

        loadUser();

    </script>

</body>
</html>
