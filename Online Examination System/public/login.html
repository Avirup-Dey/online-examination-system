<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Exam System</title>
    <link rel="stylesheet" href="/login.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon student-icon">🎓</div>
            <h1>Student Login</h1>
            <p>Access your quizzes</p>
        </div>
        
        <div id="login-form">
            <div class="error hidden" id="login-error"></div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" required>
            </div>
            <button class="btn" onclick="login()">Login as Student</button>
            <p class="switch-link">Are you an admin? <a href="/admin-login.html">Login as Admin</a></p>
            <p class="switch-link">Don't have an account? <a href="/register.html">Register as Student</a></p>
        </div>
    </div>

    <script>
        async function checkUser() {
            const response = await fetch('/api/user');
            const user = await response.json();
            if (user) {
                if (user.role === 'admin') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/student-panel.html';
                }
            }
        }
        
        checkUser();
        
        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            
            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, admin: false })
            });
            
            const data = await response.json();
            if (data.success) {
                if (data.role === 'admin') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/student-panel.html';
                }
            } else {
                errorDiv.textContent = data.error;
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
